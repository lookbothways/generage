<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ragecoding Web Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: 'Roboto', sans-serif;
            font-weight: 300;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        body.rage-active, body.rage-active * {
            cursor: none !important;
        }

        #container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            width: 100%;
            max-width: 500px;
            z-index: 10;
        }

        #controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            gap: 20px;
        }

        .left-controls {
            display: flex;
            flex-direction: column;
            gap: 5px;
            justify-content: center;
        }

        #instruction-text {
            font-size: 0.85rem;
            color: #888;
            font-weight: 400;
        }

        .timer-group {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        #generating-text {
            display: none;
            font-size: 1.5rem;
            color: #666;
            font-weight: 300;
        }

        #start-btn {
            background: transparent;
            border: none;
            font-family: 'Roboto', sans-serif;
            font-weight: 100;
            font-size: 3rem;
            color: #111;
            cursor: pointer;
            outline: none;
            text-align: left;
            padding: 0;
            transition: color 0.2s;
        }

        #start-btn:hover {
            color: #ff0000;
        }

        .dropdown-wrapper {
            display: flex;
            flex-direction: column;
            gap: 5px;
            align-items: flex-end;
        }

        .dropdown-wrapper label {
            font-size: 0.8rem;
            font-weight: 400;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select {
            font-family: 'Roboto', sans-serif;
            font-weight: 300;
            font-size: 1rem;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
            outline: none;
            cursor: pointer;
            width: 180px;
        }

        textarea {
            width: 100%;
            height: 200px;
            font-family: 'Roboto', sans-serif;
            font-weight: 300;
            font-size: 1.2rem;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            resize: none;
            background: #fafafa;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        textarea:focus {
            border-color: #bbb;
        }

        /* Styling for when the text box is locked */
        textarea:disabled {
            background-color: #ebebeb;
            color: #999;
            cursor: not-allowed;
            border-color: #e0e0e0;
            box-shadow: none;
        }

        #result-image {
            display: none;
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #result-text {
            display: none;
            font-family: 'Roboto', sans-serif;
            font-weight: 100;
            font-size: 1.2rem;
            color: #444;
            text-align: center;
            width: 100%;
            word-wrap: break-word;
            margin-top: -20px;
            font-style: italic;
        }

        #fake-cursor {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 24px;
            height: 24px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="black" stroke="white" stroke-width="1.5"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-3px, -3px);
        }

        body.rage-active #fake-cursor {
            display: block;
        }
    </style>
</head>
<body>

    <div id="fake-cursor"></div>

    <div id="container">
        <div id="controls">
            <div class="left-controls">
                <div id="instruction-text">Choose an image generation model, press start and describe the image you want to generate...</div>
                <div class="timer-group">
                    <span id="generating-text">Generating in...</span>
                    <button id="start-btn">start</button>
                </div>
            </div>
            
            <div class="dropdown-wrapper">
                <label>Current model</label>
                <select id="model-select"></select>
            </div>
        </div>
        
        <!-- Disabled by default to grey it out -->
        <textarea id="test-field" disabled></textarea>
        
        <img id="result-image" src="" alt="Generated Image">
        <div id="result-text"></div>
    </div>

    <script>
        // AI models have been doubled in difficulty and Nano Banana removed
        const AI_MODELS = {
            "Google Imagen 4 Ultra": 16.0,
            "Seedream 4.0": 20.0,
            "Google Imagen 4": 24.0,
            "Z-Image": 30.0,
            "Grok": 32.0,
            "SDXL": 34.0,
            "Mystic 2.5": 36.0,
            "Flux.2 Flex": 40.0,
            "Mystic 2.5 Fluid": 400.0
        };

        const QWERTY_COORDS = {
            'q':[0, 0], 'w':[0, 1], 'e':[0, 2], 'r':[0, 3], 't':[0, 4], 'y':[0, 5], 'u':[0, 6], 'i':[0, 7], 'o':[0, 8], 'p':[0, 9],
            'a':[1, 0.25], 's':[1, 1.25], 'd':[1, 2.25], 'f':[1, 3.25], 'g':[1, 4.25], 'h':[1, 5.25], 'j':[1, 6.25], 'k':[1, 7.25], 'l':[1, 8.25],
            'z':[2, 0.75], 'x':[2, 1.75], 'c':[2, 2.75], 'v':[2, 3.75], 'b':[2, 4.75], 'n':[2, 5.75], 'm':[2, 6.75]
        };

        let isRunning = false;
        let isFetchingImage = false;
        let timeLeft = 15; // User gets 15 seconds to type
        let timerInterval;
        let generationInterval; // Fake generation loading timer
        
        // Defaults to the new best model
        let currentMultiplier = 16.0;
        let currentModelName = "Google Imagen 4 Ultra";

        let realX = window.innerWidth / 2;
        let realY = window.innerHeight / 2;
        let lastRealX = realX;
        let lastRealY = realY;
        let jitterX = 0;
        let jitterY = 0;

        const startBtn = document.getElementById('start-btn');
        const instructionText = document.getElementById('instruction-text');
        const generatingText = document.getElementById('generating-text');
        const modelSelect = document.getElementById('model-select');
        const testField = document.getElementById('test-field');
        const resultImage = document.getElementById('result-image');
        const resultText = document.getElementById('result-text');
        const fakeCursor = document.getElementById('fake-cursor');

        for (const [name, multiplier] of Object.entries(AI_MODELS)) {
            const option = document.createElement('option');
            option.value = multiplier;
            option.textContent = name;
            modelSelect.appendChild(option);
        }
        // Set dropdown default visually
        modelSelect.value = "16";

        modelSelect.addEventListener('change', (e) => {
            currentMultiplier = parseFloat(e.target.value);
            currentModelName = modelSelect.options[modelSelect.selectedIndex].text;
        });

        function getAmount() {
            return (Math.sin(Date.now() / 1000 * 2) + 1) / 2 * 0.9 + 0.1;
        }

        function getTypo(originalChar, multiplier) {
            const lowerChar = originalChar.toLowerCase();
            if (!QWERTY_COORDS[lowerChar]) {
                const chars = "abcdefghijklmnopqrstuvwxyz";
                return chars[Math.floor(Math.random() * chars.length)];
            }

            const [r1, c1] = QWERTY_COORDS[lowerChar];
            let distances = [];

            for (const [key,[r2, c2]] of Object.entries(QWERTY_COORDS)) {
                if (key === lowerChar) continue;
                const dist = Math.hypot(r1 - r2, c1 - c2);
                distances.push({ key, dist });
            }

            distances.sort((a, b) => a.dist - b.dist);

            let poolSize = Math.max(2, Math.floor((multiplier / 20.0) * 25));
            poolSize = Math.min(25, poolSize);

            const closestKeys = distances.slice(0, poolSize).map(d => d.key);
            const wrongChar = closestKeys[Math.floor(Math.random() * closestKeys.length)];

            return originalChar === originalChar.toUpperCase() ? wrongChar.toUpperCase() : wrongChar;
        }

        startBtn.addEventListener('click', () => {
            if (isRunning || isFetchingImage) {
                stopRage(false);
                return;
            }

            resultImage.style.display = 'none';
            resultText.style.display = 'none';
            testField.style.display = 'block';
            testField.value = '';
            
            // Unlock the text area
            testField.disabled = false;

            isRunning = true;
            timeLeft = 15; 

            instructionText.style.display = 'none'; // Hide instructions while running
            generatingText.textContent = 'Generating in...';
            generatingText.style.display = 'inline';
            startBtn.style.display = 'inline-block';
            startBtn.textContent = timeLeft;
            startBtn.style.color = "#ff0000";
            document.body.classList.add('rage-active');
            testField.focus();

            timerInterval = setInterval(() => {
                timeLeft--;
                startBtn.textContent = timeLeft;
                if (timeLeft <= 0) {
                    stopRage(true);
                }
            }, 1000);
        });

        function stopRage(finishedGeneration = false) {
            isRunning = false;
            clearInterval(timerInterval);
            document.body.classList.remove('rage-active');
            jitterX = 0;
            jitterY = 0;

            if (finishedGeneration) {
                isFetchingImage = true;
                startBtn.style.display = 'none';
                instructionText.style.display = 'none'; // Keep instructions hidden during generation
                testField.disabled = true; // Lock it back up

                let finalPrompt = testField.value.trim();
                if (!finalPrompt) finalPrompt = "empty void of failure";
                resultText.textContent = `"${finalPrompt}"`;

                // Set up the fake loading/generation countdown
                let genTimeLeft = 10; // Number of seconds to fake-load
                generatingText.textContent = `Generating... ${genTimeLeft}s`;

                const triggerFallback = () => {
                    // CHANGE THIS NUMBER if you add more images to your failed folder!
                    const totalFailedImages = 10; 
                    const randomNum = Math.floor(Math.random() * totalFailedImages) + 1;
                    resultImage.src = `failed/${randomNum}.jpg`; 
                };

                generationInterval = setInterval(() => {
                    genTimeLeft--;
                    if (genTimeLeft > 0) {
                        generatingText.textContent = `Generating... ${genTimeLeft}s`;
                    } else {
                        // Time's up! Show the pre-made joke image.
                        clearInterval(generationInterval);
                        triggerFallback();
                    }
                }, 1000);

                // Runs instantly when the local image successfully loads
                resultImage.onload = () => {
                    isFetchingImage = false;
                    testField.style.display = 'none';
                    generatingText.style.display = 'none';
                    
                    // Reset UI for next round
                    instructionText.style.display = 'block';
                    startBtn.textContent = 'start';
                    startBtn.style.display = 'inline-block';
                    startBtn.style.color = "#111";
                    
                    resultImage.style.display = 'block';
                    resultText.style.display = 'block';
                };

                // Safety net in case the user forgets to upload the images
                resultImage.onerror = () => {
                    showError();
                };

            } else {
                generatingText.style.display = 'none';
                instructionText.style.display = 'block';
                startBtn.textContent = 'start';
                startBtn.style.display = 'inline-block';
                startBtn.style.color = "#111";
                testField.disabled = true; // Lock it back up on cancel
            }
        }

        function showError() {
            clearInterval(generationInterval); 
            isFetchingImage = false;
            generatingText.textContent = 'generation failed. Image missing.';
            setTimeout(() => {
                generatingText.style.display = 'none';
                instructionText.style.display = 'block';
                startBtn.textContent = 'start';
                startBtn.style.display = 'inline-block';
                startBtn.style.color = "#111";
            }, 2000);
        }

        // --- NEW: INTERCEPT PASTE EVENT ---
        testField.addEventListener('paste', (e) => {
            if (!isRunning) return;
            
            // Stop the normal paste from happening
            e.preventDefault();
            
            // Get the text they are trying to paste
            const pasteText = (e.clipboardData || window.clipboardData).getData('text');
            let garbled = '';
            
            // Process every character in the pasted text
            for (let i = 0; i < pasteText.length; i++) {
                const char = pasteText[i];
                
                // If it's a letter, apply a high chance of scrambling it
                if (/[a-zA-Z]/.test(char)) {
                    if (Math.random() < 0.8) { // 80% chance to typo the pasted letter
                        garbled += getTypo(char, currentMultiplier);
                    } else {
                        garbled += char;
                    }
                } else {
                    // Keep spaces, numbers, and punctuation exactly as they were
                    garbled += char;
                }
            }
            
            // Insert the scrambled text wherever their cursor currently is
            const start = testField.selectionStart;
            const end = testField.selectionEnd;
            testField.value = testField.value.substring(0, start) + garbled + testField.value.substring(end);
            
            // Move cursor to the end of the pasted text
            testField.selectionStart = testField.selectionEnd = start + garbled.length;
        });

        testField.addEventListener('input', (e) => {
            if (!isRunning) return;

            const char = e.data;
            if (char && /^[a-zA-Z]$/.test(char)) {
                const amount = getAmount();
                const kbMultiplier = currentMultiplier / 2.0;
                const typoChance = Math.min(0.95, 0.15 * amount * kbMultiplier);

                if (Math.random() < typoChance) {
                    const typo = getTypo(char, currentMultiplier);

                    setTimeout(() => {
                        const start = testField.selectionStart;
                        if (start > 0) {
                            testField.value = testField.value.substring(0, start - 1) + typo + testField.value.substring(start);
                            testField.selectionStart = testField.selectionEnd = start;
                        }
                    }, 80);
                }
            }
        });

        document.addEventListener('mousemove', (e) => {
            realX = e.clientX;
            realY = e.clientY;

            if (!isRunning) return;

            let dx = realX - lastRealX;
            let dy = realY - lastRealY;
            let distance = Math.hypot(dx, dy);

            if (distance > 2.0) {
                let amount = getAmount();
                let baseJitter = 2.0 * amount * currentMultiplier;
                let intensity = Math.min(150.0, distance * amount * currentMultiplier);

                let lowBound = Math.min(baseJitter, intensity);
                let highBound = Math.max(baseJitter, intensity) + 1.0;

                let jx = (Math.random() * (highBound - lowBound) + lowBound) * (Math.random() < 0.5 ? -1 : 1);
                let jy = (Math.random() * (highBound - lowBound) + lowBound) * (Math.random() < 0.5 ? -1 : 1);

                jitterX += jx;
                jitterY += jy;
            }

            lastRealX = realX;
            lastRealY = realY;
        });

        function updateCursor() {
            if (isRunning) {
                jitterX *= 0.92;
                jitterY *= 0.92;

                fakeCursor.style.left = (realX + jitterX) + 'px';
                fakeCursor.style.top = (realY + jitterY) + 'px';
            }
            requestAnimationFrame(updateCursor);
        }
        requestAnimationFrame(updateCursor);

    </script>
</body>
</html>
