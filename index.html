<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ragecoding Web Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: 'Roboto', sans-serif;
            font-weight: 300;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        body.rage-active, body.rage-active * {
            cursor: none !important;
        }

        #container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            width: 100%;
            max-width: 500px;
            z-index: 10;
        }

        #controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            gap: 20px;
        }

        .timer-group {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        #generating-text {
            display: none;
            font-size: 1.5rem;
            color: #666;
            font-weight: 300;
        }

        #start-btn {
            background: transparent;
            border: none;
            font-family: 'Roboto', sans-serif;
            font-weight: 100;
            font-size: 3rem;
            color: #111;
            cursor: pointer;
            outline: none;
            text-align: left;
            padding: 0;
            transition: color 0.2s;
        }

        #start-btn:hover {
            color: #ff0000;
        }

        .dropdown-wrapper {
            display: flex;
            flex-direction: column;
            gap: 5px;
            align-items: flex-end;
        }

        .dropdown-wrapper label {
            font-size: 0.8rem;
            font-weight: 400;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select {
            font-family: 'Roboto', sans-serif;
            font-weight: 300;
            font-size: 1rem;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
            outline: none;
            cursor: pointer;
            width: 180px;
        }

        textarea {
            width: 100%;
            height: 200px;
            font-family: 'Roboto', sans-serif;
            font-weight: 300;
            font-size: 1.2rem;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            resize: none;
            background: #fafafa;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
            box-sizing: border-box;
        }

        textarea:focus {
            border-color: #bbb;
        }

        #result-image {
            display: none;
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            object-fit: cover;
        }

        #result-text {
            display: none;
            font-family: 'Roboto', sans-serif;
            font-weight: 100;
            font-size: 1.2rem;
            color: #444;
            text-align: center;
            width: 100%;
            word-wrap: break-word;
            margin-top: -20px;
            font-style: italic;
        }

        #fake-cursor {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 24px;
            height: 24px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="black" stroke="white" stroke-width="1.5"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-3px, -3px);
        }

        body.rage-active #fake-cursor {
            display: block;
        }
    </style>
</head>
<body>

    <div id="fake-cursor"></div>

    <div id="container">
        <div id="controls">
            <div class="timer-group">
                <span id="generating-text">generating in</span>
                <button id="start-btn">start</button>
            </div>
            <div class="dropdown-wrapper">
                <label>Current model</label>
                <select id="model-select"></select>
            </div>
        </div>

        <textarea id="test-field" placeholder="Describe the image you want to generate..."></textarea>

        <img id="result-image" src="" alt="Generated Image">
        <div id="result-text"></div>
    </div>

    <script>
        const AI_MODELS = {
            "Claude 3.7 Sonnet": 2.0,
            "OpenAI o3-mini": 4.0,
            "GPT-4.5": 6.0,
            "DeepSeek R1": 8.0,
            "Gemini 1.5 Pro": 10.0,
            "Llama 3.3 70B": 12.0,
            "Grok 3": 14.0,
            "Mistral Large": 16.0,
            "Claude 2.1": 18.0,
            "GPT-3.5 Turbo": 20.0
        };

        // Pre-baked sets of 10 images per model (fetched at start)
        const imageCache = {};
        let imageCacheReady = false;

        const QWERTY_COORDS = {
            'q': [0, 0], 'w':[0, 1], 'e':[0, 2], 'r': [0, 3], 't':[0, 4], 'y':[0, 5], 'u': [0, 6], 'i':[0, 7], 'o': [0, 8], 'p':[0, 9],
            'a':[1, 0.25], 's':[1, 1.25], 'd':[1, 2.25], 'f':[1, 3.25], 'g':[1, 4.25], 'h':[1, 5.25], 'j':[1, 6.25], 'k':[1, 7.25], 'l':[1, 8.25],
            'z':[2, 0.75], 'x':[2, 1.75], 'c':[2, 2.75], 'v':[2, 3.75], 'b':[2, 4.75], 'n':[2, 5.75], 'm':[2, 6.75]
        };

        let isRunning = false;
        let isFetchingImage = false;
        let timeLeft = 60;
        let timerInterval;
        let currentMultiplier = 10.0;
        let currentModelName = "Gemini 1.5 Pro";

        let realX = window.innerWidth / 2;
        let realY = window.innerHeight / 2;
        let lastRealX = realX;
        let lastRealY = realY;
        let jitterX = 0;
        let jitterY = 0;

        const startBtn = document.getElementById('start-btn');
        const generatingText = document.getElementById('generating-text');
        const modelSelect = document.getElementById('model-select');
        const testField = document.getElementById('test-field');
        const resultImage = document.getElementById('result-image');
        const resultText = document.getElementById('result-text');
        const fakeCursor = document.getElementById('fake-cursor');

        for (const [name, multiplier] of Object.entries(AI_MODELS)) {
            const option = document.createElement('option');
            option.value = multiplier;
            option.textContent = name;
            modelSelect.appendChild(option);
        }
        modelSelect.value = "10";

        modelSelect.addEventListener('change', (e) => {
            currentMultiplier = parseFloat(e.target.value);
            currentModelName = modelSelect.options[modelSelect.selectedIndex].text;
        });

        // Fetch 10 Flickr images for a given tag and cache them per model
        async function prefetchImagesForModel(modelName) {
            if (imageCache[modelName]) return;
            // Use a generic tag relevant to "tech chaos" so we always get something
            const tags = "computer,code,technology,keyboard,screen";
            const url = `https://api.flickr.com/services/feeds/photos_public.gne?tags=${encodeURIComponent(tags)}&format=json&nojsoncallback=1`;
            try {
                const r = await fetch(url);
                const data = await r.json();
                imageCache[modelName] = data.items.slice(0, 10).map(item => item.media.m.replace('_m.', '_b.'));
            } catch(e) {
                imageCache[modelName] = [];
            }
        }

        // Prefetch for all models on load
        (async () => {
            for (const name of Object.keys(AI_MODELS)) {
                await prefetchImagesForModel(name);
            }
            imageCacheReady = true;
        })();

        function getAmount() {
            return (Math.sin(Date.now() / 1000 * 2) + 1) / 2 * 0.9 + 0.1;
        }

        function getTypo(originalChar, multiplier) {
            const lowerChar = originalChar.toLowerCase();
            if (!QWERTY_COORDS[lowerChar]) {
                const chars = "abcdefghijklmnopqrstuvwxyz";
                return chars[Math.floor(Math.random() * chars.length)];
            }

            const [r1, c1] = QWERTY_COORDS[lowerChar];
            let distances = [];

            for (const [key, [r2, c2]] of Object.entries(QWERTY_COORDS)) {
                if (key === lowerChar) continue;
                const dist = Math.hypot(r1 - r2, c1 - c2);
                distances.push({ key, dist });
            }

            distances.sort((a, b) => a.dist - b.dist);

            let poolSize = Math.max(2, Math.floor((multiplier / 20.0) * 25));
            poolSize = Math.min(25, poolSize);

            const closestKeys = distances.slice(0, poolSize).map(d => d.key);
            const wrongChar = closestKeys[Math.floor(Math.random() * closestKeys.length)];

            return originalChar === originalChar.toUpperCase() ? wrongChar.toUpperCase() : wrongChar;
        }

        startBtn.addEventListener('click', () => {
            if (isRunning || isFetchingImage) {
                stopRage(false);
                return;
            }

            resultImage.style.display = 'none';
            resultText.style.display = 'none';
            testField.style.display = 'block';
            testField.value = '';
            testField.disabled = false;

            isRunning = true;
            timeLeft = 60;

            generatingText.textContent = 'generating in';
            generatingText.style.display = 'inline';
            startBtn.style.display = 'inline-block';
            startBtn.textContent = timeLeft;
            startBtn.style.color = "#ff0000";
            document.body.classList.add('rage-active');
            testField.focus();

            timerInterval = setInterval(() => {
                timeLeft--;
                startBtn.textContent = timeLeft;
                if (timeLeft <= 0) {
                    stopRage(true);
                }
            }, 1000);
        });

        function stopRage(finishedGeneration = false) {
            isRunning = false;
            clearInterval(timerInterval);
            document.body.classList.remove('rage-active');
            jitterX = 0;
            jitterY = 0;

            if (finishedGeneration) {
                isFetchingImage = true;
                startBtn.style.display = 'none';
                generatingText.textContent = 'rendering gibberish...';
                testField.disabled = true;

                let finalPrompt = testField.value.trim();
                if (!finalPrompt) finalPrompt = "Empty void of failure";

                resultText.textContent = `"${finalPrompt}"`;

                // Pick the image corresponding to the selected model index
                const modelNames = Object.keys(AI_MODELS);
                const modelIndex = modelNames.indexOf(currentModelName);
                const cached = imageCache[currentModelName];

                let imgUrl = null;
                if (cached && cached.length > 0) {
                    // Each model gets a deterministic slot, so same model = same image (until page reload)
                    imgUrl = cached[modelIndex % cached.length];
                }

                function showImage(src) {
                    isFetchingImage = false;
                    testField.style.display = 'none';
                    generatingText.style.display = 'none';
                    startBtn.textContent = 'start';
                    startBtn.style.display = 'inline-block';
                    startBtn.style.color = "#111";
                    resultImage.src = src;
                    resultImage.style.display = 'block';
                    resultText.style.display = 'block';
                }

                function showError() {
                    isFetchingImage = false;
                    generatingText.textContent = 'generation failed.';
                    setTimeout(() => {
                        generatingText.style.display = 'none';
                        startBtn.textContent = 'start';
                        startBtn.style.display = 'inline-block';
                        startBtn.style.color = "#111";
                    }, 2000);
                }

                if (imgUrl) {
                    // Try to load; if Flickr CDN fails, fall back to live search
                    const testImg = new Image();
                    testImg.onload = () => showImage(imgUrl);
                    testImg.onerror = () => fetchLiveFlickr(finalPrompt, showImage, showError);
                    testImg.src = imgUrl;
                } else {
                    fetchLiveFlickr(finalPrompt, showImage, showError);
                }

            } else {
                generatingText.style.display = 'none';
                startBtn.textContent = 'start';
                startBtn.style.display = 'inline-block';
                startBtn.style.color = "#111";
            }
        }

        function fetchLiveFlickr(prompt, onSuccess, onError) {
            const url = `https://api.flickr.com/services/feeds/photos_public.gne?tags=${encodeURIComponent(prompt)}&format=json&nojsoncallback=1`;
            fetch(url)
                .then(r => r.json())
                .then(data => {
                    if (data.items && data.items.length > 0) {
                        const imgUrl = data.items[0].media.m.replace('_m.', '_b.');
                        onSuccess(imgUrl);
                    } else {
                        onError();
                    }
                })
                .catch(onError);
        }

        testField.addEventListener('input', (e) => {
            if (!isRunning) return;

            const char = e.data;
            if (char && /^[a-zA-Z]$/.test(char)) {
                const amount = getAmount();
                const kbMultiplier = currentMultiplier / 2.0;
                const typoChance = Math.min(0.95, 0.15 * amount * kbMultiplier);

                if (Math.random() < typoChance) {
                    const typo = getTypo(char, currentMultiplier);

                    setTimeout(() => {
                        const start = testField.selectionStart;
                        if (start > 0) {
                            testField.value = testField.value.substring(0, start - 1) + typo + testField.value.substring(start);
                            testField.selectionStart = testField.selectionEnd = start;
                        }
                    }, 80);
                }
            }
        });

        document.addEventListener('mousemove', (e) => {
            realX = e.clientX;
            realY = e.clientY;

            if (!isRunning) return;

            let dx = realX - lastRealX;
            let dy = realY - lastRealY;
            let distance = Math.hypot(dx, dy);

            if (distance > 2.0) {
                let amount = getAmount();
                let baseJitter = 2.0 * amount * currentMultiplier;
                let intensity = Math.min(150.0, distance * amount * currentMultiplier);

                let lowBound = Math.min(baseJitter, intensity);
                let highBound = Math.max(baseJitter, intensity) + 1.0;

                let jx = (Math.random() * (highBound - lowBound) + lowBound) * (Math.random() < 0.5 ? -1 : 1);
                let jy = (Math.random() * (highBound - lowBound) + lowBound) * (Math.random() < 0.5 ? -1 : 1);

                jitterX += jx;
                jitterY += jy;
            }

            lastRealX = realX;
            lastRealY = realY;
        });

        function updateCursor() {
            if (isRunning) {
                jitterX *= 0.92;
                jitterY *= 0.92;

                fakeCursor.style.left = (realX + jitterX) + 'px';
                fakeCursor.style.top = (realY + jitterY) + 'px';
            }
            requestAnimationFrame(updateCursor);
        }
        requestAnimationFrame(updateCursor);

    </script>
</body>
</html>
